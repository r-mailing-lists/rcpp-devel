name: Update Archive

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest mbox files
        run: |
          LIST_NAME=$(jq -r '.list' config.json)
          BASE_URL=$(jq -r '.source_url' config.json)

          mkdir -p raw

          curl -sL "$BASE_URL" | \
            grep -oE 'href="[^"]*\.txt(\.gz)?"' | \
            sed 's/href="//;s/"//' | \
            while read -r archive; do
              URL="${BASE_URL%/}/$archive"
              BASENAME=$(basename "$archive")
              MBOX_NAME="${BASENAME%.gz}"
              MBOX_NAME="${MBOX_NAME%.txt}.mbox"

              CURRENT_MONTH=$(date +"%Y-%B")
              if [ -f "raw/$MBOX_NAME" ] && [[ "$BASENAME" != *"$CURRENT_MONTH"* ]]; then
                continue
              fi

              echo "Downloading $BASENAME..."
              if [[ "$archive" == *.gz ]]; then
                curl -sL "$URL" | gunzip > "raw/$MBOX_NAME" 2>/dev/null || true
              else
                curl -sL "$URL" > "raw/$MBOX_NAME" 2>/dev/null || true
              fi
            done

      - name: Download rmail-parser
        run: |
          curl -sL -o rmail-parser \
            "https://github.com/r-mailing-lists/rmail-parser/releases/latest/download/rmail-parser-linux-x86_64"
          chmod +x rmail-parser

      - name: Parse mbox files
        run: |
          LIST_NAME=$(jq -r '.list' config.json)
          mkdir -p processed
          ./rmail-parser parse --input raw/ --output processed/ --list "$LIST_NAME"
          ./rmail-parser stats --input raw/ --output meta.json --list "$LIST_NAME"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/ processed/ meta.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update archive $(date +%Y-%m-%d)"
            git push
          fi
